name: X自動投稿

on:
  schedule:
    - cron: '*/30 * * * *'  # 30分ごと（JST 07:00/12:00/20:00 ±90分以内に自動投稿）
  workflow_dispatch:       # 手動実行ボタン（テスト用）

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install tweepy python-dotenv

      - name: 現在時刻を確認
        run: date '+%Y-%m-%d %H:%M:%S %Z'

      - name: 画像ファイルを確認
        run: ls -la images/ || echo "imagesフォルダなし"

      - name: X に投稿
        env:
          API_KEY: ${{ secrets.X_API_KEY }}
          API_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          TZ: Asia/Tokyo
        run: python x_poster.py --scheduled

      - name: 投稿済み記録をコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ops/sns/posted-dates.txt
          git diff --staged --quiet || git commit -m "投稿済み記録を更新 [skip ci]"
          git pull --rebase origin main
          git push origin main
