<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silver Tree — 焙煎記録ビューア</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #2D4A3E;
      --brown:   #6B4226;
      --cream:   #F8F4EE;
      --sand:    #E8E0D4;
      --text:    #1C1C1C;
      --muted:   #888;
      --warn:    #c0392b;
      --caution: #d68910;
      --ok:      #27ae60;
    }

    body {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", Georgia, serif;
      background: var(--cream);
      color: var(--text);
      max-width: 1080px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ── Header ── */
    .page-header { margin-bottom: 36px; }
    .page-header h1 {
      font-size: 1.3rem; font-weight: normal; color: var(--green);
      border-bottom: 1px solid var(--sand); padding-bottom: 10px; margin-bottom: 6px;
    }
    .page-header .sub { font-size: 0.78rem; color: var(--brown); }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 28px; border-bottom: 1px solid var(--sand); }
    .tab {
      padding: 8px 20px; font-size: 0.82rem; cursor: pointer;
      border: 1px solid transparent; border-bottom: none; border-radius: 4px 4px 0 0;
      color: var(--muted); background: none; font-family: inherit; letter-spacing: 0.05em;
    }
    .tab.active { color: var(--green); border-color: var(--sand); background: white; margin-bottom: -1px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Summary cards ── */
    .stats-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 32px; }
    .stat-card {
      background: white; border-radius: 8px; padding: 14px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07); flex: 1; min-width: 110px; text-align: center;
    }
    .stat-card .lbl { font-size: 0.68rem; color: var(--brown); margin-bottom: 4px; letter-spacing: 0.05em; }
    .stat-card .val { font-size: 1.5rem; font-weight: bold; color: var(--green); }
    .stat-card .val.warn { color: var(--warn); }

    /* ── Section title ── */
    .sec-title {
      font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em;
      text-transform: uppercase; border-bottom: 1px solid var(--sand);
      padding-bottom: 5px; margin-bottom: 16px; margin-top: 32px;
    }

    /* ── Bean inventory bars ── */
    .inv-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
    .inv-row { background: white; border-radius: 8px; padding: 14px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .inv-row-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .inv-bean { font-size: 0.88rem; color: var(--green); }
    .inv-meta { font-size: 0.76rem; color: var(--muted); }
    .inv-bar-wrap { height: 8px; background: var(--sand); border-radius: 4px; overflow: hidden; }
    .inv-bar { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
    .inv-bar.ok     { background: var(--ok); }
    .inv-bar.caution{ background: var(--caution); }
    .inv-bar.warn   { background: var(--warn); }
    .inv-status { font-size: 0.7rem; margin-top: 4px; }
    .inv-notes { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

    /* ── Roast history ── */
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
    .filter-select {
      padding: 6px 12px; border: 1px solid var(--sand); border-radius: 20px;
      font-size: 0.78rem; background: white; color: var(--text); cursor: pointer;
      font-family: inherit;
    }
    .filter-select:focus { outline: none; border-color: var(--green); }

    .roast-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
    .roast-card {
      background: white; border-radius: 10px; padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07); position: relative;
    }
    .roast-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .roast-date { font-size: 0.72rem; color: var(--muted); }
    .roast-batch { font-size: 0.7rem; background: var(--sand); color: var(--brown); padding: 2px 8px; border-radius: 10px; }
    .roast-bean { font-size: 0.92rem; color: var(--green); font-weight: bold; margin-bottom: 6px; line-height: 1.4; }
    .roast-level {
      display: inline-block; font-size: 0.68rem; padding: 2px 8px; border-radius: 10px;
      margin-bottom: 10px; letter-spacing: 0.05em;
    }
    .level-light  { background: #FFF3CD; color: #856404; }
    .level-medium { background: #D4EDDA; color: #155724; }
    .level-dark   { background: #CCE5FF; color: #004085; }
    .level-verydark{ background: #F8D7DA; color: #721c24; }

    /* Weight info */
    .weight-row { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; margin-bottom: 8px; }
    .weight-in  { color: var(--muted); }
    .arrow      { color: var(--brown); }
    .weight-out { color: var(--green); font-weight: bold; }
    .yield-badge {
      margin-left: auto; font-size: 0.7rem; background: var(--cream);
      padding: 2px 8px; border-radius: 10px; color: var(--brown);
    }

    /* Yield bar */
    .yield-bar-wrap { height: 5px; background: var(--sand); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
    .yield-bar { height: 100%; background: var(--green); border-radius: 3px; }

    .roast-notes { font-size: 0.74rem; color: var(--muted); line-height: 1.5; }

    /* ── Temperature Profile SVG ── */
    .temp-profile-wrap {
      margin-top: 10px;
      border-top: 1px solid var(--sand);
      padding-top: 8px;
    }
    .temp-profile-label {
      font-size: 0.64rem;
      color: var(--brown);
      letter-spacing: 0.08em;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    /* ── Bean analysis ── */
    .bean-analysis-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .bean-card { background: white; border-radius: 10px; padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .bean-name { font-size: 0.9rem; color: var(--green); font-weight: bold; margin-bottom: 10px; }
    .bean-stat-row { display: flex; justify-content: space-between; font-size: 0.78rem; margin-bottom: 6px; }
    .bean-stat-label { color: var(--muted); }
    .bean-stat-val { color: var(--text); font-weight: bold; }
    .bean-batches { margin-top: 10px; }
    .mini-batch { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
    .mini-yield-bar { flex: 1; height: 4px; background: var(--sand); border-radius: 2px; overflow: hidden; }
    .mini-yield-fill { height: 100%; background: var(--green); border-radius: 2px; }

    /* ── Add form ── */
    .add-form { background: white; border-radius: 10px; padding: 28px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 0.72rem; color: var(--brown); letter-spacing: 0.05em; }
    .form-group input, .form-group select, .form-group textarea {
      padding: 8px 12px; border: 1px solid var(--sand); border-radius: 6px;
      font-size: 0.84rem; font-family: inherit; background: var(--cream);
      color: var(--text);
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: var(--green);
    }
    .form-group.full { grid-column: 1 / -1; }
    .btn {
      padding: 10px 28px; border: none; border-radius: 6px; cursor: pointer;
      font-size: 0.84rem; font-family: inherit; font-weight: bold;
    }
    .btn-primary { background: var(--green); color: white; }
    .btn-primary:hover { background: #1e3328; }
    .btn-danger { background: #eee; color: var(--warn); font-size: 0.72rem; padding: 4px 10px; border-radius: 4px; }

    /* yield display in form */
    .yield-preview {
      font-size: 0.8rem; color: var(--green); font-weight: bold;
      padding: 8px 12px; background: var(--cream); border-radius: 6px;
      border: 1px solid var(--sand); display: flex; align-items: center;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .stats-row .stat-card { min-width: 80px; }
      .roast-grid { grid-template-columns: 1fr; }
    }

    .empty-msg { color: var(--muted); font-size: 0.84rem; text-align: center; padding: 40px; }
    .delete-btn {
      position: absolute; top: 12px; right: 12px;
      font-size: 0.65rem; color: var(--muted); cursor: pointer;
      background: none; border: none; opacity: 0.4; font-family: inherit;
    }
    .delete-btn:hover { opacity: 1; color: var(--warn); }
  </style>
</head>
<body>

<div class="page-header">
  <h1>Silver Tree Coffee Roaster — 焙煎記録ビューア</h1>
  <div class="sub" id="lastUpdated">最終更新: —</div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" onclick="showTab('summary')">概要・在庫</button>
  <button class="tab" onclick="showTab('history')">焙煎履歴</button>
  <button class="tab" onclick="showTab('beans')">豆別分析</button>
  <button class="tab" onclick="showTab('add')">＋ 記録追加</button>
</div>

<!-- ══════════ TAB: Summary ══════════ -->
<div id="tab-summary" class="tab-panel active">
  <div class="stats-row" id="summaryStats"></div>

  <div class="sec-title">生豆在庫状況</div>
  <div class="inv-list" id="invList"></div>
</div>

<!-- ══════════ TAB: History ══════════ -->
<div id="tab-history" class="tab-panel">
  <div class="filter-row">
    <select class="filter-select" id="filterBean" onchange="renderHistory()">
      <option value="">すべての銘柄</option>
    </select>
    <select class="filter-select" id="filterLevel" onchange="renderHistory()">
      <option value="">すべての焙煎度</option>
      <option value="浅煎り">浅煎り</option>
      <option value="中浅煎り">中浅煎り</option>
      <option value="中煎り">中煎り</option>
      <option value="中深煎り">中深煎り</option>
      <option value="深煎り">深煎り</option>
    </select>
  </div>
  <div class="roast-grid" id="roastGrid"></div>
</div>

<!-- ══════════ TAB: Bean Analysis ══════════ -->
<div id="tab-beans" class="tab-panel">
  <div class="bean-analysis-grid" id="beanAnalysis"></div>
</div>

<!-- ══════════ TAB: Add ══════════ -->
<div id="tab-add" class="tab-panel">
  <div class="add-form">
    <div class="sec-title" style="margin-top:0">焙煎記録を追加</div>
    <div class="form-grid">
      <div class="form-group">
        <label>焙煎日</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-group">
        <label>バッチ番号（例: バッチ①）</label>
        <input type="text" id="f-batch" placeholder="バッチ①">
      </div>
      <div class="form-group full">
        <label>銘柄</label>
        <input type="text" id="f-bean" list="beanList" placeholder="エチオピア イルガチャフィ G1 コチャレ ウォシュド">
        <datalist id="beanList"></datalist>
      </div>
      <div class="form-group">
        <label>焙煎度</label>
        <select id="f-level">
          <option value="浅煎り">浅煎り</option>
          <option value="中浅煎り">中浅煎り</option>
          <option value="中煎り" selected>中煎り</option>
          <option value="中深煎り">中深煎り</option>
          <option value="深煎り">深煎り</option>
        </select>
      </div>
      <div class="form-group">
        <label>投入量 (g)</label>
        <input type="number" id="f-in" placeholder="250" oninput="calcYield()">
      </div>
      <div class="form-group">
        <label>排出量 (g)</label>
        <input type="number" id="f-out" placeholder="210" oninput="calcYield()">
      </div>
      <div class="form-group">
        <label>歩留まり</label>
        <div class="yield-preview" id="yieldPreview">— %</div>
      </div>
      <div class="form-group">
        <label>開始温度 (℃)（任意）</label>
        <input type="number" id="f-startTemp" placeholder="200">
      </div>
      <div class="form-group">
        <label>排出温度 (℃)（任意）</label>
        <input type="number" id="f-endTemp" placeholder="195">
      </div>
      <div class="form-group">
        <label>焙煎時間（分）（任意）</label>
        <input type="number" id="f-time" placeholder="12">
      </div>
      <div class="form-group full">
        <label>メモ（1ハゼ・味・次回への覚書）</label>
        <textarea id="f-notes" rows="3" placeholder="1ハゼ止め。ナッツ感あり。次回は少し長めに。"></textarea>
      </div>
    </div>
    <button class="btn btn-primary" onclick="addRoast()">記録を保存</button>
  </div>
</div>

// ══════════════════════════════════════════
//  LocalStorage
// ══════════════════════════════════════════
function loadRoasts() {
  const saved = localStorage.getItem('st_roasts');
  if (!saved) {
    localStorage.setItem('st_roasts', JSON.stringify(SEED_ROASTS));
    return SEED_ROASTS;
  }
  let data = JSON.parse(saved);
  // 新しいシードレコードをマージ（未収録のseedを自動追加）
  const existingIds = new Set(data.map(r => r.id));
  const newSeeds = SEED_ROASTS.filter(r => !existingIds.has(r.id));
  if (newSeeds.length > 0) {
    data = [...data, ...newSeeds];
    localStorage.setItem('st_roasts', JSON.stringify(data));
  }
  return data;
}
function saveRoasts(data) {
  localStorage.setItem('st_roasts', JSON.stringify(data));
}
function loadInventory() {
  const savedVersion = localStorage.getItem('st_inventory_version');
  const saved = localStorage.getItem('st_inventory');
  if (saved && savedVersion === INVENTORY_VERSION) return JSON.parse(saved);
  // バージョン更新 or 初回: 最新データで上書き
  localStorage.setItem('st_inventory', JSON.stringify(INVENTORY));
  localStorage.setItem('st_inventory_version', INVENTORY_VERSION);
  return INVENTORY;
}

// ══════════════════════════════════════════
//  Tabs
// ══════════════════════════════════════════
function showTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  event.currentTarget.classList.add('active');
  if (id === 'history') renderHistory();
  if (id === 'beans')   renderBeans();
  if (id === 'add')     populateBeanDatalist();
}

// ══════════════════════════════════════════
//  Level helpers
// ══════════════════════════════════════════
function levelClass(level) {
  if (level === '浅煎り' || level === '中浅煎り') return 'level-light';
  if (level === '中煎り') return 'level-medium';
  if (level === '中深煎り') return 'level-dark';
  return 'level-verydark';
}

function yieldColor(y) {
  if (y >= 85) return '#27ae60';
  if (y >= 82) return '#2D4A3E';
  return '#d68910';
}

// ══════════════════════════════════════════
//  Temperature Profile SVG
// ══════════════════════════════════════════
function makeTempSvg(tp) {
  const W = 290, H = 128;
  const padL = 30, padR = 22, padT = 8, padB = 18;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;
  const minT = 60, maxT = 250, maxMin = 14;

  function tx(m) { return padL + (m / maxMin) * plotW; }
  function ty(t) { return padT + plotH - ((t - minT) / (maxT - minT)) * plotH; }
  function f(n)  { return n.toFixed(1); }

  // 水平グリッド線
  const gridTemps = [80, 100, 130, 160, 190, 220];
  const gridLines = gridTemps.map(t => {
    const yy = ty(t);
    const isTgt = t === tp.drumTarget;
    return `<line x1="${padL}" y1="${f(yy)}" x2="${W - padR}" y2="${f(yy)}"
      stroke="${isTgt ? '#e09b5a' : '#E8E0D4'}" stroke-width="${isTgt ? 1.5 : 0.5}"
      ${isTgt ? 'stroke-dasharray="4,2"' : ''}/>
      <text x="${padL - 3}" y="${f(yy + 3.5)}" font-size="7.5" text-anchor="end" fill="#bbb">${t}</text>`;
  }).join('');

  // 垂直グリッド線 & X軸ラベル
  const xMarks = [0, 3, 6, 8, 10, 12, 14].map(m => {
    const xx = tx(m);
    return `<line x1="${f(xx)}" y1="${padT}" x2="${f(xx)}" y2="${f(padT + plotH)}"
      stroke="#E8E0D4" stroke-width="0.5"/>
      <text x="${f(xx)}" y="${f(padT + plotH + 10)}" font-size="7.5" text-anchor="middle" fill="#bbb">${m}</text>`;
  }).join('');

  // ドラム・豆のポリライン
  const drumPts = tp.timepoints.filter(p => p.drum != null)
    .map(p => `${f(tx(p.min))},${f(ty(p.drum))}`).join(' ');
  const beanPts = tp.timepoints.filter(p => p.bean != null)
    .map(p => `${f(tx(p.min))},${f(ty(p.bean))}`).join(' ');

  // ドット
  const drumDots = tp.timepoints.filter(p => p.drum != null)
    .map(p => `<circle cx="${f(tx(p.min))}" cy="${f(ty(p.drum))}" r="2.5" fill="#e67e22"/>`).join('');
  const beanDots = tp.timepoints.filter(p => p.bean != null)
    .map(p => `<circle cx="${f(tx(p.min))}" cy="${f(ty(p.bean))}" r="2.5" fill="#2D4A3E"/>`).join('');

  // 1ハゼ縦線マーカー
  let crack1Svg = '';
  if (tp.crack1) {
    const [hh, ss] = tp.crack1.time.split(':').map(Number);
    const crMin = hh + ss / 60;
    const cx = tx(crMin);
    crack1Svg = `<line x1="${f(cx)}" y1="${padT}" x2="${f(cx)}" y2="${f(padT + plotH)}"
      stroke="#6B4226" stroke-width="1.2" stroke-dasharray="3,2"/>
      <text x="${f(cx + 2)}" y="${f(padT + 11)}" font-size="7.5" fill="#6B4226">1ハゼ</text>`;
  }

  // 目標温度ラベル
  const targetY = ty(tp.drumTarget);
  const targetLabel = `<text x="${W - padR + 2}" y="${f(targetY + 3)}" font-size="7" fill="#e09b5a">${tp.drumTarget}℃</text>`;

  // 凡例
  const legY = H + 4;
  const legend = `
    <rect x="${padL}" y="${legY}" width="10" height="3" fill="#e67e22" rx="1"/>
    <text x="${padL + 13}" y="${legY + 4}" font-size="8" fill="#888">ドラム</text>
    <rect x="${padL + 58}" y="${legY}" width="10" height="3" fill="#2D4A3E" rx="1"/>
    <text x="${padL + 71}" y="${legY + 4}" font-size="8" fill="#888">豆</text>
    <text x="${W / 2}" y="${H + 16}" font-size="7.5" text-anchor="middle" fill="#bbb">経過時間（分）</text>`;

  return `<svg viewBox="0 0 ${W} ${H + 20}" width="100%"
    style="max-width:${W}px;display:block;" xmlns="http://www.w3.org/2000/svg">
    ${gridLines}${xMarks}${crack1Svg}${targetLabel}
    <polyline points="${drumPts}" fill="none" stroke="#e67e22" stroke-width="2"
      stroke-linejoin="round" stroke-linecap="round"/>
    <polyline points="${beanPts}" fill="none" stroke="#2D4A3E" stroke-width="2"
      stroke-linejoin="round" stroke-linecap="round"/>
    ${drumDots}${beanDots}${legend}
  </svg>`;
}

// ══════════════════════════════════════════
//  Summary Tab
// ══════════════════════════════════════════
function renderSummary() {
  const roasts = loadRoasts();
  const inv    = loadInventory();

  // Update timestamp
  if (roasts.length) {
    const latest = roasts.slice().sort((a,b) => b.date.localeCompare(a.date))[0];
    document.getElementById('lastUpdated').textContent =
      '最終焙煎日: ' + latest.date + ' | データ更新: ' + new Date().toLocaleDateString('ja-JP');
  }

  // Stats
  const totalIn  = roasts.reduce((s, r) => s + r.weightIn, 0);
  const totalOut = roasts.reduce((s, r) => s + r.weightOut, 0);
  const avgYield = totalIn > 0 ? (totalOut / totalIn * 100) : 0;
  const dates    = [...new Set(roasts.map(r => r.date))].length;
  const lowInv   = inv.filter(i => i.stock < i.orderLine).length;
  const totalInv = inv.reduce((s,i) => s + i.stock, 0);

  document.getElementById('summaryStats').innerHTML = `
    <div class="stat-card">
      <div class="lbl">焙煎バッチ数</div>
      <div class="val">${roasts.length}</div>
    </div>
    <div class="stat-card">
      <div class="lbl">焙煎日数</div>
      <div class="val">${dates}</div>
    </div>
    <div class="stat-card">
      <div class="lbl">累計投入量</div>
      <div class="val">${(totalIn/1000).toFixed(2)}<span style="font-size:0.9rem">kg</span></div>
    </div>
    <div class="stat-card">
      <div class="lbl">累計排出量</div>
      <div class="val">${(totalOut/1000).toFixed(2)}<span style="font-size:0.9rem">kg</span></div>
    </div>
    <div class="stat-card">
      <div class="lbl">平均歩留まり</div>
      <div class="val">${avgYield.toFixed(1)}<span style="font-size:0.9rem">%</span></div>
    </div>
    <div class="stat-card">
      <div class="lbl">総在庫</div>
      <div class="val">${totalInv.toFixed(2)}<span style="font-size:0.9rem">kg</span></div>
    </div>
    ${lowInv > 0 ? `<div class="stat-card">
      <div class="lbl">要発注銘柄</div>
      <div class="val warn">${lowInv}</div>
    </div>` : ''}
  `;

  // Inventory
  const html = inv.map(item => {
    const pct = Math.min(item.stock / item.max * 100, 100);
    const status = item.stock < item.orderLine ? 'warn'
                 : item.stock < item.orderLine * 1.2 ? 'caution' : 'ok';
    const statusText = item.stock < item.orderLine ? '🔴 発注ライン以下'
                     : item.stock < item.orderLine * 1.2 ? '🟠 要注意' : '🟢 正常';
    return `
      <div class="inv-row">
        <div class="inv-row-top">
          <div class="inv-bean">${item.bean}</div>
          <div class="inv-meta">${item.stock.toFixed(2)} kg / 発注ライン ${item.orderLine} kg</div>
        </div>
        <div class="inv-bar-wrap">
          <div class="inv-bar ${status}" style="width:${pct}%"></div>
        </div>
        <div style="display:flex;justify-content:space-between">
          <div class="inv-status">${statusText}</div>
          <div class="inv-notes">${item.notes}</div>
        </div>
      </div>`;
  }).join('');
  document.getElementById('invList').innerHTML = html;
}

// ══════════════════════════════════════════
//  History Tab
// ══════════════════════════════════════════
function renderHistory() {
  const roasts   = loadRoasts();
  const filterB  = document.getElementById('filterBean').value;
  const filterL  = document.getElementById('filterLevel').value;

  // Populate filter options
  const beans = [...new Set(roasts.map(r => r.bean))];
  const beanSel = document.getElementById('filterBean');
  const currentVal = beanSel.value;
  beanSel.innerHTML = '<option value="">すべての銘柄</option>' +
    beans.map(b => `<option value="${b}" ${b === currentVal ? 'selected' : ''}>${b}</option>`).join('');

  // Filter
  const filtered = roasts
    .filter(r => !filterB || r.bean === filterB)
    .filter(r => !filterL || r.level === filterL)
    .sort((a, b) => b.date.localeCompare(a.date));

  if (!filtered.length) {
    document.getElementById('roastGrid').innerHTML = '<div class="empty-msg">記録がありません</div>';
    return;
  }

  document.getElementById('roastGrid').innerHTML = filtered.map(r => {
    const yld = (r.weightOut / r.weightIn * 100).toFixed(1);
    return `
    <div class="roast-card">
      <button class="delete-btn" onclick="deleteRoast('${r.id}')">✕ 削除</button>
      <div class="roast-card-top">
        <div class="roast-date">${r.date}</div>
        <div class="roast-batch">${r.batch}</div>
      </div>
      <div class="roast-bean">${r.bean}</div>
      <span class="roast-level ${levelClass(r.level)}">${r.level}</span>
      <div class="weight-row">
        <span class="weight-in">${r.weightIn}g</span>
        <span class="arrow">→</span>
        <span class="weight-out">${r.weightOut}g</span>
        <span class="yield-badge">歩留まり ${yld}%</span>
      </div>
      <div class="yield-bar-wrap">
        <div class="yield-bar" style="width:${Math.min(parseFloat(yld),100)}%;background:${yieldColor(parseFloat(yld))}"></div>
      </div>
      ${r.startTemp || r.endTemp || r.time ? `<div class="roast-notes" style="margin-bottom:6px">
        ${r.startTemp ? '開始 '+r.startTemp+'℃' : ''}
        ${r.endTemp ? '　排出 '+r.endTemp+'℃' : ''}
        ${r.time ? '　'+r.time+'分' : ''}
      </div>` : ''}
      ${r.notes ? `<div class="roast-notes">${r.notes}</div>` : ''}
      ${r.tempProfile ? `<div class="temp-profile-wrap">
        <div class="temp-profile-label">温度プロファイル</div>
        ${makeTempSvg(r.tempProfile)}
      </div>` : ''}
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
//  Bean Analysis Tab
// ══════════════════════════════════════════
function renderBeans() {
  const roasts = loadRoasts();
  const beanMap = {};
  roasts.forEach(r => {
    if (!beanMap[r.bean]) beanMap[r.bean] = [];
    beanMap[r.bean].push(r);
  });

  document.getElementById('beanAnalysis').innerHTML = Object.entries(beanMap).map(([bean, batches]) => {
    const totalIn  = batches.reduce((s, r) => s + r.weightIn, 0);
    const totalOut = batches.reduce((s, r) => s + r.weightOut, 0);
    const avgYield = (totalOut / totalIn * 100).toFixed(1);
    const levels   = [...new Set(batches.map(r => r.level))].join(' / ');
    const lastDate = batches.slice().sort((a,b) => b.date.localeCompare(a.date))[0].date;

    const batchRows = batches
      .sort((a,b) => b.date.localeCompare(a.date))
      .map(r => {
        const yld = (r.weightOut / r.weightIn * 100).toFixed(1);
        return `<div class="mini-batch">
          <span style="min-width:70px">${r.date}</span>
          <span style="min-width:55px">${r.batch}</span>
          <div class="mini-yield-bar">
            <div class="mini-yield-fill" style="width:${Math.min(parseFloat(yld),100)}%"></div>
          </div>
          <span style="min-width:45px;text-align:right">${yld}%</span>
        </div>`;
      }).join('');

    return `
    <div class="bean-card">
      <div class="bean-name">${bean}</div>
      <div class="bean-stat-row"><span class="bean-stat-label">バッチ数</span><span class="bean-stat-val">${batches.length}回</span></div>
      <div class="bean-stat-row"><span class="bean-stat-label">累計投入</span><span class="bean-stat-val">${totalIn.toFixed(0)}g</span></div>
      <div class="bean-stat-row"><span class="bean-stat-label">平均歩留まり</span><span class="bean-stat-val">${avgYield}%</span></div>
      <div class="bean-stat-row"><span class="bean-stat-label">焙煎度</span><span class="bean-stat-val">${levels}</span></div>
      <div class="bean-stat-row"><span class="bean-stat-label">最終焙煎</span><span class="bean-stat-val">${lastDate}</span></div>
      <div class="sec-title" style="margin-top:14px;font-size:0.65rem">バッチ別歩留まり</div>
      <div class="bean-batches">${batchRows}</div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
//  Add Roast
// ══════════════════════════════════════════
function calcYield() {
  const wIn  = parseFloat(document.getElementById('f-in').value);
  const wOut = parseFloat(document.getElementById('f-out').value);
  if (wIn > 0 && wOut > 0 && wOut < wIn) {
    const y = (wOut / wIn * 100).toFixed(1);
    document.getElementById('yieldPreview').textContent = y + ' %';
    document.getElementById('yieldPreview').style.color = yieldColor(parseFloat(y));
  } else {
    document.getElementById('yieldPreview').textContent = '— %';
    document.getElementById('yieldPreview').style.color = '';
  }
}

function populateBeanDatalist() {
  const roasts = loadRoasts();
  const beans  = [...new Set([
    ...roasts.map(r => r.bean),
    ...INVENTORY.map(i => i.bean)
  ])];
  document.getElementById('beanList').innerHTML =
    beans.map(b => `<option value="${b}">`).join('');
  // Set today's date
  const today = new Date().toISOString().split('T')[0];
  if (!document.getElementById('f-date').value) {
    document.getElementById('f-date').value = today;
  }
}

function addRoast() {
  const date  = document.getElementById('f-date').value;
  const batch = document.getElementById('f-batch').value || 'バッチ①';
  const bean  = document.getElementById('f-bean').value.trim();
  const level = document.getElementById('f-level').value;
  const wIn   = parseFloat(document.getElementById('f-in').value);
  const wOut  = parseFloat(document.getElementById('f-out').value);
  const sT    = document.getElementById('f-startTemp').value;
  const eT    = document.getElementById('f-endTemp').value;
  const time  = document.getElementById('f-time').value;
  const notes = document.getElementById('f-notes').value.trim();

  if (!date || !bean || !wIn || !wOut) {
    alert('焙煎日・銘柄・投入量・排出量は必須です');
    return;
  }
  if (wOut >= wIn) { alert('排出量は投入量より小さい値にしてください'); return; }

  const roasts = loadRoasts();
  roasts.push({
    id: 'r_' + Date.now(),
    date, batch, bean, level,
    weightIn: wIn, weightOut: wOut,
    startTemp: sT ? parseFloat(sT) : null,
    endTemp: eT ? parseFloat(eT) : null,
    time: time ? parseFloat(time) : null,
    notes,
    tempProfile: null
  });
  saveRoasts(roasts);
  alert('記録を保存しました ✓');
  // Reset form
  document.getElementById('f-bean').value = '';
  document.getElementById('f-in').value = '';
  document.getElementById('f-out').value = '';
  document.getElementById('f-startTemp').value = '';
  document.getElementById('f-endTemp').value = '';
  document.getElementById('f-time').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('f-batch').value = '';
  document.getElementById('yieldPreview').textContent = '— %';
  renderSummary();
}

function deleteRoast(id) {
  if (!confirm('この記録を削除しますか？')) return;
  const roasts = loadRoasts().filter(r => r.id !== id);
  saveRoasts(roasts);
  renderHistory();
  renderSummary();
}

// ══════════════════════════════════════════
//  Init
// ══════════════════════════════════════════
renderSummary();
</script>
</body>
</html>
